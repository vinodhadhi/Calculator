<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator.css">
    <style>
        body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f6ed8c;
}
.container{
    border: 1px solid black ;
    width: fit-content;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: rgb(78, 75, 75);
    
    
    .input{
        padding: 5px;
        margin-bottom: 20px;
        height: 15px;
        input{
            height: 20px;
            text-align: right;
            
        }

    }
    .row1, .row2, .row3, .row4, .row5{

        #mul,#div, #sub, #add,#equals{
            background-color: orange;
            color: white;
        }
        display: flex;
        gap: 5px;
        margin-bottom: 5px;
        button{
            width: 40px;
            height: 40px;
            font-size: 18px;
            border-radius: 10px;
        }
        }
        .row5{
            #equals{
                width: 85px;
            }
    }
}

    </style>

    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="input">
            <input type="text" id="result" >
        </div>
        <div class="row1">
            <button id="del">del</button>
            <button id="ac">AC</button>
            <button id="dot">.</button>
            <button id="div">/</button>
        </div>
        <div class="row2">
            <button id = "seven">7</button>
            <button id="eight">8</button>
            <button id="nine">9</button>
            <button id="mul">*</button>
        </div>
        <div class="row3">
            <button id="four">4</button>
            <button id="five">5</button>
            <button id="six">6</button>
            <button id="sub">-</button>
        </div>
        <div class="row4">
            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button id="add">+</button>
        </div>
        <div class="row5">
            <button id="zero">0</button>
            <button id="zerozero">00</button>
            <button id="equals">=</button>
        </div>
    </div>
    <script>
        let display = document.getElementById("result");
let one = document.getElementById("one");
let two = document.getElementById("two");
let three = document.getElementById("three");
let four = document.getElementById("four");
let five = document.getElementById("five");
let six = document.getElementById("six");
let seven = document.getElementById("seven");
let eight = document.getElementById("eight");
let nine = document.getElementById("nine");
let zero = document.getElementById("zero");
let zerozero = document.getElementById("zerozero");

let add = document.getElementById("add");
let subtract = document.getElementById("sub");
let multiply = document.getElementById("mul");
let divide = document.getElementById("div");

let equals = document.getElementById("equals");
let ac= document.getElementById("ac");
let del= document.getElementById("del");
let dot= document.getElementById("dot");

one.addEventListener("click", () => {
    display.value += "1";
});

two.addEventListener("click", () => {
    display.value += "2";
});

three.addEventListener("click", () => {
    display.value += "3";
});

four.addEventListener("click", () => {
    display.value += "4";
});

five.addEventListener("click", () => {
    display.value += "5";
});

six.addEventListener("click", () => {
    display.value += "6";
});

seven.addEventListener("click", () => {
    display.value += "7";
});

eight.addEventListener("click", () => {
    display.value += "8";
});

nine.addEventListener("click", () => {
    display.value += "9";
});

zero.addEventListener("click", () => {
    display.value += "0";
});

zerozero.addEventListener("click", () => {
    display.value += "00";
});

del.addEventListener("click", () => {
    display.value = display.value.slice(0, -1);
});

ac.addEventListener("click", () => {
    display.value = "";
});

dot.addEventListener("click", () => {
    display.value += ".";
});

add.addEventListener("click", () => {
    display.value += "+";
});

subtract.addEventListener("click", () => {
    display.value += "-";
}); 
multiply.addEventListener("click", () => {
    display.value += "*";
});

divide.addEventListener("click", () => {
    display.value += "/";
});
equals.addEventListener("click", () => {
    display.value = eval(display.value);
});
    </script>
</body>
</html>
